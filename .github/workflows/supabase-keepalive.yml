name: Supabase keep-alive

# The Supabase free tier auto-pauses projects after ~1 week without activity,
# which silently takes down ai2aichat.com (happened May 2026). This pings an
# edge function that performs a real database query, which counts as activity.
on:
  schedule:
    - cron: '17 6 */3 * *' # every 3 days at 06:17 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase via workshop-config get-public
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST 'https://jeqygwsufnzjjjnvkbkr.supabase.co/functions/v1/workshop-config' \
            -H 'Content-Type: application/json' \
            --data '{"action":"get-public","code":"keepalive-ping"}')
          echo "HTTP $code"
          # 404 (workshop not found) is the expected, healthy response —
          # it proves the function ran a SELECT against the database.
          # 200 would mean a real workshop named keepalive-ping exists.
          # Anything else (401 = JWT verification re-enabled by mistake,
          # 5xx, 000 = paused/unreachable) means no DB activity happened.
          if [ "$code" -ne 404 ] && [ "$code" -ne 200 ]; then
            echo "Unexpected status $code — function may not be reaching the database" >&2
            exit 1
          fi
