<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#1e1b4b"/>
  <!-- Bot 1: orange filled circle -->
  <circle cx="10" cy="16" r="6" fill="#f97316"/>
  <!-- Bot 1: eyes -->
  <circle cx="8.2" cy="15" r="1.1" fill="white"/>
  <circle cx="11.8" cy="15" r="1.1" fill="white"/>
  <!-- Bot 1: mouth -->
  <rect x="7.8" y="17.5" width="4.4" height="1.1" rx="0.55" fill="white"/>
  <!-- Bot 2: sky-blue filled circle -->
  <circle cx="22" cy="16" r="6" fill="#0ea5e9"/>
  <!-- Bot 2: eyes -->
  <circle cx="20.2" cy="15" r="1.1" fill="white"/>
  <circle cx="23.8" cy="15" r="1.1" fill="white"/>
  <!-- Bot 2: mouth -->
  <rect x="19.8" y="17.5" width="4.4" height="1.1" rx="0.55" fill="white"/>
